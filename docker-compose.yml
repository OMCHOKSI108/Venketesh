services:
  redis:
    image: redis:7-alpine
    container_name: market-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: market-postgres
    environment:
      POSTGRES_DB: marketdata
      POSTGRES_USER: market
      POSTGRES_PASSWORD: market
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U market -d marketdata"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: market-backend
    environment:
      APP_NAME: market-data-platform
      DEBUG: "false"
      LOG_LEVEL: INFO
      ENVIRONMENT: development
      API_V1_PREFIX: /api/v1
      REDIS_URL: redis://redis:6379/0
      REDIS_POOL_SIZE: 50
      REDIS_OHLC_TTL_SECONDS: 60
      DATABASE_URL: postgresql+asyncpg://market:market@postgres:5432/marketdata
      DATABASE_POOL_SIZE: 20
      NSE_BASE_URL: https://www.nseindia.com
      NSE_QUOTE_URL: https://www.nseindia.com/api/quote-equity
      NSE_TIMEOUT_SECONDS: 10
      POLL_INTERVAL: 2
      WS_HEARTBEAT_INTERVAL: 30
      DEFAULT_SYMBOL: NIFTY
      DEFAULT_TIMEFRAME: 1m
      DEFAULT_LIMIT: 100
      MAX_LIMIT: 1000
      YAHOO_PERIOD: 1d
      YAHOO_INTERVAL: 1m
      NSE_ENABLED: "true"
      YAHOO_ENABLED: "true"
      UPSTOX_ENABLED: "false"
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: market-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
