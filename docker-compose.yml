version: '3.8'

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+asyncpg://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql+asyncpg://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://:@redis:6379/1
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth'
    AIRFLOW__CORE__LOGGING_LEVEL: INFO
    PYTHONUNBUFFERED: 1
    REDIS_URL: redis://redis:6379/0
    DATABASE_URL: postgresql+asyncpg://market:market@postgres:5432/marketdata
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./backend:/app/backend
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    redis:
      condition: service_healthy
    postgres:
      condition: service_healthy

services:
  # Redis for caching and message queue
  redis:
    image: redis:7-alpine
    container_name: market-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  # PostgreSQL with TimescaleDB for time-series data
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: market-postgres
    environment:
      POSTGRES_DB: marketdata
      POSTGRES_USER: market
      POSTGRES_PASSWORD: market
      # Airflow DB
      POSTGRES_DB_AIRFLOW: airflow
      POSTGRES_USER_AIRFLOW: airflow
      POSTGRES_PASSWORD_AIRFLOW: airflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U market -d marketdata"]
      interval: 5s
      timeout: 5s
      retries: 20

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: market-backend
    environment:
      APP_NAME: market-data-platform
      DEBUG: "false"
      LOG_LEVEL: INFO
      ENVIRONMENT: development
      API_V1_PREFIX: /api/v1
      REDIS_URL: redis://redis:6379/0
      REDIS_POOL_SIZE: 50
      DATABASE_URL: postgresql+asyncpg://market:market@postgres:5432/marketdata
      DATABASE_POOL_SIZE: 20
      NSE_BASE_URL: https://www.nseindia.com
      NSE_TIMEOUT_SECONDS: 10
      POLL_INTERVAL: 2
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # Frontend
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: market-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  # Airflow Web Server
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: on-failure

  # Airflow Scheduler
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname '$HOSTNAME'"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: on-failure

  # Airflow Triggerer
  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type TriggererJob --hostname '$HOSTNAME'"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: on-failure

  # Airflow Init
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /opt/airflow/logs /opt/airflow/dags /opt/airflow/plugins
        exec /entrypoint/airflow version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_USER:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_PASSWORD:-airflow}

volumes:
  postgres_data: