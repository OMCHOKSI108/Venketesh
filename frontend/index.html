<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Data Platform - NIFTY</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        #chart { width: 100%; height: 70vh; }
    </style>
</head>
<body class="bg-gray-100">
    <div class="header-bar flex items-center justify-between px-4 py-2 bg-white shadow">
        <div class="flex items-center gap-4">
            <span class="text-lg font-semibold" id="symbol-label">NIFTY</span>
            <span class="text-gray-500" id="timeframe-label">1m</span>
        </div>
        <div class="flex items-center gap-2">
            <div id="status-dot" class="w-3 h-3 rounded-full bg-red-500"></div>
            <span class="text-sm text-gray-600" id="source-indicator">Offline</span>
        </div>
    </div>
    <div id="chart"></div>

    <script>
        const API_BASE = 'http://localhost:8000/api/v1';
        let chart, candleSeries;
        let currentSymbol = 'NIFTY';
        let currentTimeframe = '1m';

        function initChart() {
            chart = LightweightCharts.createChart(document.getElementById('chart'), {
                width: window.innerWidth,
                height: window.innerHeight * 0.7,
                layout: {
                    background: { type: 'solid', color: '#ffffff' },
                    textColor: '#333333',
                },
                grid: {
                    vertLines: { color: '#e0e0e0' },
                    horzLines: { color: '#e0e0e0' },
                },
                crosshair: {
                    mode: LightweightCharts.CrosshairMode.Normal,
                },
                rightPriceScale: {
                    borderColor: '#e0e0e0',
                },
                timeScale: {
                    borderColor: '#e0e0e0',
                    timeVisible: true,
                },
            });

            candleSeries = chart.addCandlestickSeries({
                upColor: '#26a69a',
                downColor: '#ef5350',
                borderVisible: false,
                wickUpColor: '#26a69a',
                wickDownColor: '#ef5350',
            });

            window.addEventListener('resize', () => {
                chart.resize(window.innerWidth, window.innerHeight * 0.7);
            });
        }

        async function fetchHistoricalData() {
            try {
                const response = await fetch(`${API_BASE}/ohlc/${currentSymbol}?timeframe=${currentTimeframe}&limit=200`);
                if (!response.ok) throw new Error('Failed to fetch data');
                const data = await response.json();
                return data.data || [];
            } catch (error) {
                console.error('Error fetching data:', error);
                return [];
            }
        }

        function formatCandleForLWC(candle) {
            return {
                time: candle.time,
                open: candle.open,
                high: candle.high,
                low: candle.low,
                close: candle.close,
            };
        }

        async function loadData() {
            updateStatus('loading');
            const candles = await fetchHistoricalData();
            if (candles.length > 0) {
                const formattedCandles = candles.map(formatCandleForLWC);
                candleSeries.setData(formattedCandles);
                chart.timeScale().fitContent();
                updateStatus('connected');
            } else {
                updateStatus('offline');
            }
        }

        function updateStatus(status) {
            const dot = document.getElementById('status-dot');
            const label = document.getElementById('source-indicator');
            
            dot.classList.remove('bg-green-500', 'bg-yellow-500', 'bg-red-500', 'bg-gray-500');
            
            switch(status) {
                case 'connected':
                    dot.classList.add('bg-green-500');
                    label.textContent = 'Live';
                    break;
                case 'loading':
                    dot.classList.add('bg-yellow-500');
                    label.textContent = 'Loading...';
                    break;
                case 'reconnecting':
                    dot.classList.add('bg-yellow-500');
                    label.textContent = 'Reconnecting...';
                    break;
                case 'offline':
                default:
                    dot.classList.add('bg-red-500');
                    label.textContent = 'Offline';
                    break;
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            initChart();
            await loadData();
        });
    </script>
</body>
</html>
